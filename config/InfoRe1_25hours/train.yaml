path:
  ckpt_path: "./output/ckpt/InfoRe1"
  log_path: "./output/log/InfoRe1"
  result_path: "./output/result/InfoRe1"
dataset:
  train_file: "train.txt"
  val_file: "val.txt"
optimizer:
  batch_size: 4
  betas: [0.9, 0.98]
  eps: 0.000000001
  weight_decay: 0.0
  grad_clip_thresh: 1.0
  grad_acc_step: 4
  warm_up_step: 4000
  anneal_steps: [150000, 220000, 280000]
  anneal_rate: 0.3
step:
  total_step: 300000
  log_step: 50
  synth_step: 500
  val_step: 1000
  save_step: 8000
  keep_best_ckpts: 3
dataloader:
  group_size: 2
  num_workers: 2
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2
accelerator:
  use_amp: false
  cudnn_benchmark: false
