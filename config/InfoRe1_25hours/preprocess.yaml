dataset: "InfoRe1"

path:
  corpus_path: "./corpus/infore1_25hours"
  raw_path: "./raw_data/InfoRe1"
  preprocessed_path: "./preprocessed_data/InfoRe1"

preprocessing:
  val_size: 256
  text:
    text_cleaners: ["basic_cleaners"]
    language: "vi"
  audio:
    sampling_rate: 22050
    max_wav_value: 32768.0
  stft:
    filter_length: 1024
    hop_length: 256
    win_length: 1024
  mel:
    n_mel_channels: 80
    mel_fmin: 0
    mel_fmax: 8000
  pitch:
    feature: "phoneme_level"
    normalization: True
  energy:
    feature: "phoneme_level"
    normalization: True
