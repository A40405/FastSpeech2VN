dataset: "InfoRe1"

path:
  corpus_path: "./corpus/infore1_25hours"
  raw_path: "./raw_data/InfoRe1"
  preprocessed_path: "./preprocessed_data/InfoRe1"
  lexicon_path: "./mfa_assets/infore1_vi.dict"
  g2p_model_path: "./mfa_assets/infore1_vi_g2p_model.zip"
  mfa_executable: "mfa"

preprocessing:
  val_size: 256
  text:
    text_cleaners: ["basic_cleaners"]
    language: "vi"
  alignment:
    silence_labels: ["", "sil", "sp", "spn"]
    pause_phone: "sp"
    repair_zero_durations: true
    drop_unrecoverable_zero_durations: true
    collapse_consecutive_pauses: true
    min_total_duration_frames: 24
    max_zero_duration_repaired: 3
    max_zero_duration_repaired_ratio: 0.04
    max_one_frame_non_silence_count: 18
    max_one_frame_non_silence_ratio: 0.18
    max_pause_frame_ratio: 0.35
  audio:
    sampling_rate: 22050
    max_wav_value: 32768.0
  stft:
    filter_length: 1024
    hop_length: 256
    win_length: 1024
  mel:
    n_mel_channels: 80
    mel_fmin: 0
    mel_fmax: 8000
  pitch:
    feature: "frame_level"
    normalization: True
  energy:
    feature: "phoneme_level"
    normalization: True
